name: Create Daily TIL with AI

on:
  workflow_dispatch:

jobs:
  generate-til:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch today's Notion pages and generate TIL
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_ROOT_PAGE_ID: ${{ secrets.NOTION_ROOT_PAGE_ID }}
        run: |
          python3 << 'EOF'
import os, json, sys
from urllib import request
from datetime import datetime, timezone, timedelta

NOTION_API_KEY = os.environ['NOTION_API_KEY']
ANTHROPIC_API_KEY = os.environ['ANTHROPIC_API_KEY']
ROOT_PAGE_ID = os.environ['NOTION_ROOT_PAGE_ID']
KST = timezone(timedelta(hours=9))
today = datetime.now(KST).date()

def notion_get(path):
    req = request.Request(
        f"https://api.notion.com/v1/{path}",
        headers={
            "Authorization": f"Bearer {NOTION_API_KEY}",
            "Notion-Version": "2022-06-28"
        }
    )
    with request.urlopen(req) as res:
        return json.loads(res.read())

def get_blocks_recursive(block_id):
    """토글 포함 모든 블록을 재귀적으로 가져오기"""
    data = notion_get(f"blocks/{block_id}/children?page_size=100")
    lines = []
    for block in data.get('results', []):
        btype = block.get('type', '')
        obj = block.get(btype, {})
        rich = obj.get('rich_text', [])
        text = ''.join(t.get('plain_text', '') for t in rich)

        if btype == 'heading_1':
            lines.append(f"# {text}")
        elif btype == 'heading_2':
            lines.append(f"## {text}")
        elif btype == 'heading_3':
            lines.append(f"### {text}")
        elif btype in ('bulleted_list_item', 'numbered_list_item'):
            lines.append(f"- {text}")
        elif btype == 'toggle':
            lines.append(f"### {text}")  # 토글 제목도 포함
        elif btype == 'code':
            lang = obj.get('language', '')
            lines.append(f"```{lang}\n{text}\n```")
        elif btype == 'paragraph' and text:
            lines.append(text)
        elif btype == 'callout' and text:
            lines.append(f"> {text}")

        # 토글이나 하위 블록 있으면 재귀 탐색
        if block.get('has_children'):
            lines.extend(get_blocks_recursive(block['id']))

    return lines

# 루트 페이지 하위 페이지 중 오늘 수정된 것만 수집
children = notion_get(f"blocks/{ROOT_PAGE_ID}/children?page_size=100")
all_content = []

for block in children.get('results', []):
    if block.get('type') != 'child_page':
        continue
    last_edited = block.get('last_edited_time', '')
    dt = datetime.fromisoformat(last_edited.replace('Z', '+00:00')).astimezone(KST)
    title = block['child_page']['title']
    print(f"페이지: {title} | 수정일: {dt.date()}", file=sys.stderr)

    if dt.date() != today:
        continue

    lines = get_blocks_recursive(block['id'])
    if lines:
        all_content.append(f"### 페이지: {title}\n" + '\n'.join(lines))

if not all_content:
    print("오늘 수정된 노션 페이지 내용이 없습니다.", file=sys.stderr)
    sys.exit(0)

notion_text = '\n\n'.join(all_content)
print("=== 수집된 노션 내용 ===", file=sys.stderr)
print(notion_text, file=sys.stderr)

# Claude API 호출
date_str = datetime.now(KST).strftime('%Y-%m-%d')
prompt = f"""You are a TIL (Today I Learned) writer. Based on the Notion notes below, generate a TIL markdown file in EXACTLY this format. Output ONLY the markdown, nothing else.

# {date_str}

## What I did

- (오늘 한 일을 bullet point로 요약)

## Key concepts learned

- (배운 핵심 개념들을 bullet point로, 각 개념에 한 줄 설명 추가)

## Commands / Configuration

### (주제명)

```
(코드나 설정이 있으면 여기, 없으면 이 섹션 전체 생략)
```

## References

- (관련 공식 문서나 링크)

---

Notion notes:
{notion_text}

Rules:
- Commands / Configuration 섹션은 코드나 설정이 있을 때만 포함
- References는 실제 존재하는 공식 문서 링크만
- 노션에 작성된 언어(한국어/영어)를 그대로 따를 것"""

body = json.dumps({
    "model": "claude-sonnet-4-5",
    "max_tokens": 1500,
    "messages": [{"role": "user", "content": prompt}]
}).encode()

req = request.Request(
    "https://api.anthropic.com/v1/messages",
    data=body,
    headers={
        "x-api-key": ANTHROPIC_API_KEY,
        "anthropic-version": "2023-06-01",
        "content-type": "application/json"
    }
)

with request.urlopen(req) as res:
    data = json.loads(res.read())

til_content = data['content'][0]['text']
print("=== 생성된 TIL ===", file=sys.stderr)
print(til_content, file=sys.stderr)

year = datetime.now(KST).strftime('%Y')
os.makedirs(f"TIL/{year}", exist_ok=True)
filepath = f"TIL/{year}/{date_str}.md"
with open(filepath, 'w') as f:
    f.write(til_content)
print(f"파일 생성 완료: {filepath}")
EOF

      - name: Commit and push
        run: |
          DATE=$(TZ='Asia/Seoul' date '+%Y-%m-%d')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "docs: TIL ${DATE}"
          git push
